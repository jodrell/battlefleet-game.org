site_name: "Battlefleet Gothic: Remastered"
site_url: https://battlefleet-game.org/
site_description: "Online version of the Battlefleet Gothic: Remastered Rulebook (v1.10)"

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/toggle-switch
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/toggle-switch-off-outline
  custom_dir: overrides
  logo: assets/image--004.png
  favicon: assets/favicon.png
  features:
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.expand
  
extra:
  generator: false

extra_css:
  - assets/extra.css

markdown_extensions:
  - md_in_html
  - tables
  - attr_list
  - footnotes
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true
      toc_depth: 4

validation:
  absolute_links: ignore

nav:
  - index.md
  - the-rules.md
  - the-turn.md
  - the-movement-phase.md
  - the-shooting-phase.md
  - the-ordnance-phase.md
  - the-end-phase.md
  - squadrons.md
  - planetary-defences.md
  - the-battlefield.md
  - Scenarios:
    - scenarios/index.md
    - scenarios/cruiser-clash.md
    - scenarios/the-bait.md
    - scenarios/the-raiders.md
    - scenarios/surprise-attack.md
    - scenarios/blockade-run.md
    - scenarios/convoy.md
    - scenarios/planetary-assault.md
    - scenarios/escalating-engagement.md
    - scenarios/exterminatus.md
    - scenarios/fleet-engagement.md
  - campaign-rules.md
